name: Deploy Apps to Netlify

# This workflow owns all Netlify deployments.
# Netlify's GitHub Bot auto-publishing should be disabled on all sites
# (run the disable-netlify-autobuild workflow once to do this).
#
# Behaviour:
#   - Push to main  → production deploy of changed apps
#   - Pull request  → preview deploy of changed apps + PR comment with URLs
#   - Manual        → specify apps to deploy (comma-separated folder names, or "all")

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'apps.json'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/**'
      - 'apps.json'
  workflow_dispatch:
    inputs:
      apps:
        description: 'App folder names, comma-separated (empty = changed apps, "all" = every app)'
        required: false
        default: ''
      production:
        description: 'Deploy as production (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write       # commit updated apps.json for newly provisioned sites
  pull-requests: write  # post preview URL comments

jobs:
  # ── 1. Detect which apps changed ──────────────────────────────────────────
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed apps
        id: detect
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.apps }}" ]; then
            # Manual dispatch — explicit list or "all"
            if [ "${{ github.event.inputs.apps }}" = "all" ]; then
              APPS=$(jq -c '[.apps[].folder]' apps.json)
            else
              APPS=$(echo "${{ github.event.inputs.apps }}" \
                | tr ',' '\n' | sed 's/^ *//;s/ *$//' \
                | grep -v '^$' | jq -R . | jq -s -c .)
            fi

          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              CHANGED=$(git show --name-only --format='' HEAD || echo "")
            else
              CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
            fi
            APPS=$(echo "$CHANGED" \
              | grep '^apps/' | cut -d'/' -f2 | grep -v '^$' \
              | sort -u | jq -R . | jq -s -c .)

          else
            # Pull request
            git fetch origin "${{ github.base_ref }}" --depth=1
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
            APPS=$(echo "$CHANGED" \
              | grep '^apps/' | cut -d'/' -f2 | grep -v '^$' \
              | sort -u | jq -R . | jq -s -c .)
          fi

          [ -z "$APPS" ] || [ "$APPS" = "null" ] && APPS="[]"

          echo "Changed apps: $APPS"
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"

  # ── 2. Build & deploy ─────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    needs: detect
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Build & deploy changed apps
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_TEAM_ID: ${{ secrets.NETLIFY_TEAM_ID }}
          # Production when pushing to main, or when manually forced
          IS_PROD: >-
            ${{
              (github.ref == 'refs/heads/main' && github.event_name == 'push')
              || github.event.inputs.production == 'true'
            }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.sha }}
          APPS: ${{ needs.detect.outputs.apps }}
        run: |
          set -euo pipefail

          DEPLOY_TABLE=""       # rows for the PR comment table
          APPS_JSON_UPDATED=false

          for FOLDER in $(echo "$APPS" | jq -r '.[]'); do
            echo ""
            echo "══════════════════════════════════════════════════════"
            echo "App: $FOLDER"

            APP_DIR="apps/$FOLDER"
            if [ ! -d "$APP_DIR" ]; then
              echo "  SKIP: $APP_DIR not found in repository"
              continue
            fi

            # ── a. Resolve Netlify site name ─────────────────────────────────
            URL=$(jq -r --arg f "$FOLDER" \
              '.apps[] | select(.folder == $f) | .url // ""' apps.json)

            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              # Derive site name from the URL (e.g. https://aisle-foo.netlify.app → aisle-foo)
              SITE_NAME=$(echo "$URL" | sed 's|https://||; s|\.netlify\.app.*||')
              echo "  Site: $SITE_NAME"
            else
              # New app — provision a bare Netlify site (no GitHub link → no Bot auto-deploy)
              SITE_NAME="aisle-$FOLDER"
              echo "  New app — provisioning $SITE_NAME ..."

              SITE_RESP=$(curl -sf -X POST "https://api.netlify.com/api/v1/sites" \
                -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"$SITE_NAME\",\"account_slug\":\"$NETLIFY_TEAM_ID\"}" \
                || echo "__ERROR__")

              if echo "$SITE_RESP" | grep -q "__ERROR__"; then
                echo "  ✗ curl failed when provisioning site"
                DEPLOY_TABLE="${DEPLOY_TABLE}\n| \`$FOLDER\` | ❌ Provisioning failed |"
                continue
              fi

              # If name is already taken the site was created by deploy-netlify-new.yml —
              # look it up instead.
              if echo "$SITE_RESP" | jq -e '.errors' > /dev/null 2>&1; then
                echo "  Site may already exist — looking up by name"
                EXISTING=$(curl -sf \
                  "https://api.netlify.com/api/v1/sites?name=$SITE_NAME&filter=all" \
                  -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN")
                URL=$(echo "$EXISTING" | jq -r \
                  --arg n "$SITE_NAME" '.[] | select(.name == $n) | .ssl_url' | head -1)
              else
                URL=$(echo "$SITE_RESP" | jq -r '.ssl_url // empty')
              fi

              if [ -z "$URL" ]; then
                echo "  ✗ Could not determine URL for new site"
                DEPLOY_TABLE="${DEPLOY_TABLE}\n| \`$FOLDER\` | ❌ Provisioning failed |"
                continue
              fi

              # Persist URL to apps.json so subsequent runs skip provisioning
              TMP=$(jq --arg f "$FOLDER" --arg u "$URL" \
                '.apps = [.apps[] | if .folder == $f then .url = $u else . end]' \
                apps.json)
              echo "$TMP" > apps.json
              APPS_JSON_UPDATED=true
              echo "  Provisioned: $URL"
            fi

            # ── b. Parse netlify.toml ─────────────────────────────────────────
            TOML="$APP_DIR/netlify.toml"
            PUBLISH_DIR="."
            BUILD_CMD=""

            if [ -f "$TOML" ]; then
              PUB=$(sed -n 's/^[[:space:]]*publish[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' \
                "$TOML" | head -1)
              [ -n "$PUB" ] && PUBLISH_DIR="$PUB"

              CMD=$(sed -n 's/^[[:space:]]*command[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' \
                "$TOML" | head -1)
              # Ignore the static-site no-op placeholder
              [[ "$CMD" == echo* ]] || BUILD_CMD="$CMD"
            fi

            echo "  Publish: $PUBLISH_DIR  |  Build: ${BUILD_CMD:-(none)}"

            # ── c. Build ─────────────────────────────────────────────────────
            if [ -n "$BUILD_CMD" ]; then
              echo "  Building..."
              (cd "$APP_DIR" && eval "$BUILD_CMD")
            fi

            # ── d. Deploy ────────────────────────────────────────────────────
            # Resolve the directory to pass to --dir
            if [ "$PUBLISH_DIR" = "." ]; then
              DEPLOY_DIR="$APP_DIR"
            else
              DEPLOY_DIR="$APP_DIR/$PUBLISH_DIR"
            fi

            SHORT_SHA="${COMMIT_SHA:0:7}"
            if [ "$IS_PROD" = "true" ]; then
              DEPLOY_MSG="Production deploy $SHORT_SHA"
            else
              DEPLOY_MSG="Preview PR #${PR_NUMBER:-manual} @ $SHORT_SHA"
            fi

            DEPLOY_ARGS=(
              "--auth=$NETLIFY_AUTH_TOKEN"
              "--dir=$DEPLOY_DIR"
              "--site=$SITE_NAME"
              "--message=$DEPLOY_MSG"
              "--json"
            )
            [ "$IS_PROD" = "true" ] && DEPLOY_ARGS+=("--prod")

            echo "  Deploying (prod=$IS_PROD)..."
            DEPLOY_OUT=$(netlify deploy "${DEPLOY_ARGS[@]}" 2>/dev/null || echo "{}")

            # Production → main URL; preview → unique deploy URL
            if [ "$IS_PROD" = "true" ]; then
              DEPLOY_URL=$(echo "$DEPLOY_OUT" | jq -r '.url // empty')
            else
              DEPLOY_URL=$(echo "$DEPLOY_OUT" | jq -r '.deploy_url // empty')
            fi

            if [ -n "$DEPLOY_URL" ]; then
              echo "  ✓ $DEPLOY_URL"
              DEPLOY_TABLE="${DEPLOY_TABLE}\n| \`$FOLDER\` | $DEPLOY_URL |"
            else
              echo "  ✗ No URL returned — deploy may have failed"
              echo "$DEPLOY_OUT"
              DEPLOY_TABLE="${DEPLOY_TABLE}\n| \`$FOLDER\` | ❌ Deploy failed |"
            fi
          done

          echo ""
          echo "══════════════════════════════════════════════════════"

          # Expose outputs for subsequent steps
          {
            echo "deploy_table<<EOF"
            printf "%b" "$DEPLOY_TABLE"
            echo ""
            echo "EOF"
            echo "apps_json_updated=$APPS_JSON_UPDATED"
          } >> "$GITHUB_OUTPUT"

      # ── Commit apps.json if new sites were provisioned ─────────────────────
      - name: Commit updated apps.json
        if: steps.deploy.outputs.apps_json_updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Actions: update apps.json with Netlify URLs for new apps [skip ci]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}

      # ── Post / update a single PR comment with all preview URLs ────────────
      - name: Post preview URLs on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deploy_table != ''
        uses: actions/github-script@v7
        with:
          script: |
            const table = `${{ steps.deploy.outputs.deploy_table }}`.trim();
            if (!table) return;

            const sha = '${{ github.sha }}'.substring(0, 7);
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = [
              '## Netlify Deploy Previews',
              '',
              '| App | Preview URL |',
              '|-----|-------------|',
              table,
              '',
              `*Commit \`${sha}\` · [Workflow run](${runUrl})*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Update existing bot comment rather than spamming new ones
            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('## Netlify Deploy Previews')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
