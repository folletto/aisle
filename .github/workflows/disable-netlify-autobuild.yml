name: 🕹️ Netlify: Disable Bot Auto-Publishing

# One-time utility: run this manually to stop the Netlify Bot from
# auto-deploying your existing sites.  After this, all deployments go
# through the deploy.yml GitHub Actions workflow instead.
#
# Safe to re-run — it's idempotent.

on:
  workflow_dispatch:

permissions:
  contents: none

jobs:
  disable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stop auto-publishing on all Netlify sites
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          URLS=$(jq -r '.apps[] | select(.url != null and .url != "") | .url' apps.json)

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue

            SITE_NAME=$(echo "$URL" | sed 's|https://||; s|\.netlify\.app.*||')
            echo "──────────────────────────────────────"
            echo "Site: $SITE_NAME"

            # Look up the site ID by name
            SITE_DATA=$(curl -sf \
              "https://api.netlify.com/api/v1/sites?name=$SITE_NAME&filter=all" \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN")

            SITE_ID=$(echo "$SITE_DATA" | jq -r \
              --arg n "$SITE_NAME" '.[] | select(.name == $n) | .id' | head -1)

            if [ -z "$SITE_ID" ]; then
              echo "  Not found on Netlify — skipping"
              continue
            fi

            # stop_builds = true → Netlify ignores GitHub push events
            PATCH=$(curl -s -w "\n%{http_code}" -X PATCH \
              "https://api.netlify.com/api/v1/sites/$SITE_ID" \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"build_settings": {"stop_builds": true}}')

            HTTP=$(echo "$PATCH" | tail -1)
            BODY=$(echo "$PATCH" | head -n -1)

            if [ "$HTTP" = "200" ]; then
              echo "  ✓ Auto-publishing disabled (id: $SITE_ID)"
            else
              echo "  ✗ Failed (HTTP $HTTP)"
              echo "$BODY" | jq . || echo "$BODY"
            fi
          done <<< "$URLS"

          echo ""
          echo "Done. All sites will now only deploy via the deploy.yml workflow."
